databases:
  - name: studymatcher-db
    plan: free

services:
  - type: web
    name: studymatcher-backend
    env: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "uvicorn config.asgi:application --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: studymatcher-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DEBUG
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://study-ai-matcher-ixua.vercel.app"
